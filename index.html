<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تفعيل الاشتراك</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#121212;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.box{
    background:#1e1e1e;
    padding:30px;
    border-radius:15px;
    text-align:center;
    max-width:500px;
    box-shadow:0 0 20px rgba(0,0,0,0.4);
}

h1{
    color:#ff4d4d;
}

p{
    font-size:18px;
    line-height:1.8;
}

button{
    margin-top:15px;
    padding:12px 25px;
    border:none;
    border-radius:8px;
    background:#6c3cff;
    color:white;
    font-size:16px;
    cursor:pointer;
}
</style>
</head>
<body>

<div class="box">
    <h1>⚠️ تفعيل الاشتراك مطلوب</h1>

    <p>
        يجب تفعيل الاشتراك لإكمال استخدام خدماتنا.
        <br><br>
        <strong>Subscription activation is required to continue using our services.</strong>
    </p>

    <button>تفعيل الاشتراك | Activate Subscription</button>
</div>

</body>
</html>
